services:
  app:
    image: ghcr.io/nekosuneprojects/rabbitclone-app:main
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      SQLITE_FILE: /data/rabbitclone.sqlite
      DATA_FILE: /data/rabbitclone.json
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-to-a-long-random-string}
      IDLE_SHUTDOWN_MINUTES: ${IDLE_SHUTDOWN_MINUTES:-10}
      WORKER_IMAGE: ${WORKER_IMAGE:-ghcr.io/nekosuneprojects/rabbitclone-worker:main}
      AUTO_PULL_WORKER_IMAGE: ${AUTO_PULL_WORKER_IMAGE:-1}
      WORKER_NETWORK: ${WORKER_NETWORK:-rabbitclone_net}
      RTSP_INTERNAL_BASE: ${RTSP_INTERNAL_BASE:-rtsp://mediamtx:8554}
      RTSP_PUBLIC_BASE: ${RTSP_PUBLIC_BASE:-rtsp://localhost:8554}
      CAPTURE_SIZE: ${CAPTURE_SIZE:-1280x720}
      FPS: ${FPS:-30}
      VIDEO_BITRATE: ${VIDEO_BITRATE:-2500k}
      RUNNING_IN_DOCKER: "1"
    volumes:
      - rabbitclone_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mediamtx
    networks:
      - rabbitclone_net

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - rabbitclone_net

  worker-image:
    image: ghcr.io/nekosuneprojects/rabbitclone-worker:main
    profiles:
      - build
    command: ["bash", "-lc", "echo worker image built"]
    networks:
      - rabbitclone_net

volumes:
  rabbitclone_data:

networks:
  rabbitclone_net:
    name: rabbitclone_net
